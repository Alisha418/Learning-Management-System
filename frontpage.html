<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Growing for a Better Tomorrow</title>
   
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: #eae4e4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
       
            
      
        .container {
            display: flex;
            max-width: 1200px;
            width: 100%;
            padding: 20px;
            justify-content: space-between;
            align-items: center;
        }
        .text-section {
            max-width: 500px;
        }

            line-height: 1.2;
        }
        .highlight {
            color: #2f2f2f;
        }
        .text-section p {
            font-size: 16px;
            color: #2f2f2f;
            margin-top: 10px;
        }
        .get-start {
            margin-top: 20px;
            padding: 12px 24px;
            font-size: 16px;
            background: linear-gradient(135deg,#2f2f4c, #0056b3);
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .get-start:hover {
            background: #2f2f2f;
        }
        .image-section img {
            
    max-width: 1000px;  /* Maximum width */

    width: 50vw;
    mix-blend-mode: multiply;
    border: none; /* Remove border */
    outline: none; /* Remove outline */
    box-shadow: none;
  
        }
        @media (max-width: 768px) {
    .hero-image {

}

</head>

            <a href="Second_Page.html">
