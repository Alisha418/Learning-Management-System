<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Role</title>
    <style>
        /* Reset Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Full Page Centering */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to bottom, #2f2f4c, #1a084c);
            color: white;
            text-align: center;
        }

        /* Container */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            max-width: 90%;
        }

        /* Cards */
        .card {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            width: 250px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" onclick="navigateTo('http://localhost/LMS/College-Management-System/')">
            <div class="icon">👤</div>
            <h2>Admin</h2>
            <p>Login as an administrator to access the dashboard to manage app data.</p>
        </div>
        <a href="project/studentlogin.php">
        <div class="card" >
            <div class="icon">🎓</div>
            <h2>Student</h2>
            <p>Login as a student to explore course materials and assignments.</p>
        </div>
    </a>
        <div class="card" onclick="navigateTo('Teacher_Login.html')">
            <div class="icon">👥</div>
            <h2>Teacher</h2>
            <p>Login as a teacher to create courses, assignments, and track student progress.</p>
        </div>
    </div>

    <script>
        function navigateTo(page) {
            window.location.href = page;
        }
    </script>

</body>
</html>
